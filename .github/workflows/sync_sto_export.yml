name: Sync STO Export

on:
  push:
    branches: [main]
    paths:
      - "data.py"
      - "supabase_client.py"
      - "gdrive.py"
      - "sync_sto_export.py"
      - "mobile_sto.py"
      - "app.py"
  schedule:
    # 09:30 Chile (13:30 UTC) · 13:00 Chile (17:00 UTC) · 18:00 Chile (22:00 UTC)
    - cron: "30 13 * * *"
    - cron: "0 17 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python sync_sto_export.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
