name: Sync Fracttal → Supabase

on:
  schedule:
    # 06:00, 12:00, 18:00 Chile (10:00, 16:00, 22:00 UTC)
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python sync_fracttal_supabase.py --modo incremental
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
