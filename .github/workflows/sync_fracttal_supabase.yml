name: Sync Fracttal → Supabase

on:
  schedule:
    # Cada hora en punto. Necesario para que el tab 'SLA en curso' refleje
    # con maximo 1h de retraso: nuevas correctivas, cierres, cancelaciones,
    # y no muestre OTs que ya fueron cerradas en Fracttal como 'pendientes'.
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python sync_fracttal_supabase.py --modo incremental
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # Sync de subtareas con numeral (1 fila por OT × activo). Poblar esta
      # tabla es lo que hace visible cada OT en las vistas 'Registros
      # relevantes' y las validaciones de calidad por subtarea. Corre después
      # del sync principal para que las OTs ya estén cargadas.
      - run: python sync_numerales_subtarea.py --modo incremental
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
