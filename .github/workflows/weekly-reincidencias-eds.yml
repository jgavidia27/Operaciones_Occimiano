name: Weekly Reincidencias EDS (email grupal)

# Corre TODOS los MIÉRCOLES a las 11:00 hora Chile.
# Chile en invierno UTC-4 → 15:00 UTC = 11:00 CLT
# Chile en verano UTC-3 → 14:00 UTC = 11:00 CLT
# Usamos 14:00 UTC (~10:00-11:00 CLT según DST). Aceptable.
on:
  schedule:
    - cron: "0 14 * * 3"       # Miércoles 14:00 UTC
  workflow_dispatch:            # permite ejecutar manualmente
    inputs:
      dry_run:
        description: "Modo prueba (NO envía correo, solo genera el Excel)"
        type: boolean
        default: true            # DEFAULT TRUE → protege contra envíos accidentales
      test_email:
        description: "Redirigir el correo a este email (para pruebas)"
        type: string
        default: ""

jobs:
  send-reincidencias:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests streamlit

      - name: Send weekly reincidencias EDS
        env:
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:            ${{ secrets.SUPABASE_KEY }}
          FRACTTAL_CLIENT_ID:      ${{ secrets.FRACTTAL_CLIENT_ID }}
          FRACTTAL_CLIENT_SECRET:  ${{ secrets.FRACTTAL_CLIENT_SECRET }}
          BUK_API_TOKEN:           ${{ secrets.BUK_API_TOKEN }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
        # En cron programado (schedule) SIEMPRE se envía real.
        # En trigger manual se respetan los inputs dry_run / test_email.
        run: |
          ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              ARGS="$ARGS --dry-run"
            fi
            if [[ -n "${{ inputs.test_email }}" ]]; then
              ARGS="$ARGS --test-email ${{ inputs.test_email }}"
            fi
          fi
          echo "Ejecutando: python send_weekly_reincidencias_eds.py $ARGS"
          python send_weekly_reincidencias_eds.py $ARGS
